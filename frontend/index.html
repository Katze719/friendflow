<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>friendflow</title>
    <meta
      name="description"
      content="Share trip links, split expenses and plan with your friends."
    />

    <!-- Open Graph (WhatsApp, Facebook, Telegram, iMessage, LinkedIn, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="friendflow" />
    <meta property="og:title" content="friendflow" />
    <meta
      property="og:description"
      content="Share trip links, split expenses and plan with your friends."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="friendflow" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="friendflow" />
    <meta
      name="twitter:description"
      content="Share trip links, split expenses and plan with your friends."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <script>
      // Apply saved theme before paint to avoid a flash.
      (function () {
        try {
          var pref = localStorage.getItem("friendflow.theme") || "system";
          var accent = localStorage.getItem("friendflow.accent") || "indigo";
          var accents = {
            indigo: "#4f46e5",
            ocean: "#0369a1",
            emerald: "#047857",
            rose: "#be123c",
            lavender: "#7e22ce",
            sky: "#1d4ed8",
            peach: "#c2410c",
            pink: "#b5179e",
          };
          if (!accents[accent]) accent = "indigo";
          document.documentElement.dataset.accent = accent;
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.setAttribute("content", accents[accent]);
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
