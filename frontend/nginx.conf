server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml application/xml+rss
               text/javascript image/svg+xml;

    # API proxy to the backend container.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed assets -> long cache.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static icons / manifest / share image. Not content-hashed, so we cache
    # for a week with `public` (CDN-friendly) - this keeps the browser from
    # re-downloading /favicon-192.png every time it appears in both the
    # <link rel=icon> header and as an <img> in the React header.
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|webmanifest)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
