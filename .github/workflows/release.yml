name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  backend-linux:
    name: Backend Linux Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build backend release binary
        run: cargo build --release

      - name: Package backend artifact
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_ROOT="friendflow-backend-${TAG}-linux-x86_64"
          mkdir -p "../release-assets/${PACKAGE_ROOT}"
          cp target/release/friendflow-backend "../release-assets/${PACKAGE_ROOT}/"
          cp ../README.md "../release-assets/${PACKAGE_ROOT}/"
          cp ../.env.example "../release-assets/${PACKAGE_ROOT}/"
          tar -C ../release-assets -czf "../release-assets/${PACKAGE_ROOT}.tar.gz" "${PACKAGE_ROOT}"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-backend-linux
          path: release-assets/*.tar.gz
          if-no-files-found: error

  frontend-web:
    name: Frontend Web Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package frontend artifact
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_ROOT="friendflow-frontend-${TAG}-dist"
          mkdir -p "../release-assets/${PACKAGE_ROOT}"
          cp -R dist/. "../release-assets/${PACKAGE_ROOT}/"
          cp ../README.md "../release-assets/${PACKAGE_ROOT}/"
          tar -C ../release-assets -czf "../release-assets/${PACKAGE_ROOT}.tar.gz" "${PACKAGE_ROOT}"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-frontend-web
          path: release-assets/*.tar.gz
          if-no-files-found: error

  android-release:
    name: Android Release AAB and APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Capacitor assets
        env:
          VITE_DEFAULT_INSTANCE_URL: https://friendflow.site
        run: npm run mobile:build

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build signed release AAB and APK
        env:
          FRIENDFLOW_UPLOAD_STORE_FILE: release-keystore.jks
          FRIENDFLOW_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          FRIENDFLOW_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          FRIENDFLOW_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FRIENDFLOW_VERSION_CODE: ${{ github.run_number }}
          FRIENDFLOW_VERSION_NAME: ${{ github.event.release.tag_name }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew bundleRelease assembleRelease

      - name: Copy Android artifacts
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p ../release-assets
          cp android/app/build/outputs/bundle/release/app-release.aab "../release-assets/friendflow-android-${TAG}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "../release-assets/friendflow-android-${TAG}.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            release-assets/*.aab
            release-assets/*.apk
          if-no-files-found: error

  ios-app-store:
    name: iOS App Store IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    env:
      APP_BUNDLE_ID: app.friendflow.mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Capacitor assets
        env:
          VITE_DEFAULT_INSTANCE_URL: https://friendflow.site
        run: npm run mobile:build

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: frontend/ios/App

      - name: Validate iOS release secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          test -n "$APPLE_TEAM_ID"
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD"
          test -n "$IOS_PROVISIONING_PROFILE_BASE64"
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"

      - name: Prepare iOS signing assets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/ios-distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/app-store.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/app-store-profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          if ! printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null; then
            printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          fi

          if ! printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH" 2>/dev/null; then
            printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"
          PROFILE_BUNDLE_ID="${PROFILE_APP_ID#${PROFILE_TEAM_ID}.}"

          if [ "$PROFILE_TEAM_ID" != "$APPLE_TEAM_ID" ]; then
            echo "Provisioning profile team '$PROFILE_TEAM_ID' does not match APPLE_TEAM_ID '$APPLE_TEAM_ID'."
            exit 1
          fi

          if [ "$PROFILE_BUNDLE_ID" != "$APP_BUNDLE_ID" ]; then
            echo "Provisioning profile bundle id '$PROFILE_BUNDLE_ID' does not match '$APP_BUNDLE_ID'."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "IOS_PROVISIONING_PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$API_KEYS_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          mkdir -p "$API_KEYS_DIR"
          if ! printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH" 2>/dev/null; then
            printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$API_KEY_PATH"
          fi
          chmod 600 "$API_KEY_PATH"

      - name: Resolve App Store version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          APP_VERSION="${TAG#v}"
          APP_VERSION="${APP_VERSION%%-*}"
          APP_VERSION="${APP_VERSION%%+*}"

          if ! [[ "$APP_VERSION" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "Release tag '$TAG' does not resolve to a valid App Store version. Use tags like v1.0.0."
            exit 1
          fi

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Create App Store export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p ios/build
          /usr/libexec/PlistBuddy -c 'Clear dict' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :method string app-store-connect' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :teamID string '"$APPLE_TEAM_ID" ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :signingStyle string manual' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :stripSwiftSymbols bool true' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :uploadSymbols bool true' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :provisioningProfiles dict' ios/build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c 'Add :provisioningProfiles:'"$APP_BUNDLE_ID"' string '"$IOS_PROVISIONING_PROFILE_NAME" ios/build/ExportOptions.plist

      - name: Archive iOS app
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            -archivePath ios/build/App.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            clean archive

      - name: Export signed IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/build/App.xcarchive \
            -exportOptionsPlist ios/build/ExportOptions.plist \
            -exportPath ios/build/export

      - name: Copy iOS IPA
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p ../release-assets
          IPA_PATH="$(find ios/build/export -type f -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          cp "$IPA_PATH" "../release-assets/friendflow-ios-${TAG}.ipa"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-app-store
          path: release-assets/*.ipa
          if-no-files-found: error

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "../release-assets/friendflow-ios-${TAG}.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --output-format xml

  attach:
    name: Attach Assets To Release
    runs-on: ubuntu-latest
    needs:
      - backend-linux
      - frontend-web
      - android-release
      - ios-app-store
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.aab
            release-assets/*.apk
            release-assets/*.ipa
